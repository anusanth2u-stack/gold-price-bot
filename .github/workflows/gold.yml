name: Gold Price Bot

on:
  schedule:
    - cron: '30 3-12 * * *'   # 9 AM–6 PM IST every hour
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install requests beautifulsoup4

    - name: Run script
      run: python gold.py
