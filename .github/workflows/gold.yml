name: Gold Price Bot

on:
  schedule:
    - cron: '30 3-12 * * *'
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-22.04   # 🔥 IMPORTANT CHANGE

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"   # 🔥 DOUBLE FIX (quotes + string)

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run script
        run: python gold.py
